<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像比率計算ツール</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #222;
      --sub: #666;
      --line: #e7e7ef;
      --accent: #5b7cfa;
      --accent-weak: #eef2ff;
      --ok: #1f8f5f;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f8f9ff 0%, #f5f5fa 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    .title {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: .02em;
      margin: 0 0 8px;
    }

    .lead {
      margin: 0 0 24px;
      color: var(--sub);
      line-height: 1.7;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(91,124,250,.12);
    }

    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, opacity .2s ease, background .2s ease;
    }

    button:hover { opacity: .95; }
    button:active { transform: translateY(1px); }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: var(--accent-weak);
      color: var(--accent);
    }

    .ghost {
      background: #f3f4f8;
      color: #444;
    }

    .dropzone {
      border: 2px dashed #cfd5ea;
      border-radius: 16px;
      background: #fafbff;
      padding: 22px;
      text-align: center;
      color: var(--sub);
      transition: .2s ease;
      margin-top: 10px;
    }

    .dropzone.active {
      border-color: var(--accent);
      background: #f4f7ff;
      color: var(--accent);
    }

    .result {
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid #dbe5ff;
      border-radius: 18px;
      padding: 20px;
    }

    .result-label {
      color: var(--sub);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .result-value {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      color: var(--ok);
      letter-spacing: .02em;
      word-break: break-word;
    }

    .mini {
      margin-top: 10px;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.7;
    }

    .formula {
      margin-top: 14px;
      padding: 12px 14px;
      background: #f7f8fc;
      border-radius: 12px;
      font-size: 14px;
      color: #555;
    }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .footer-note {
      margin-top: 16px;
      font-size: 12px;
      color: #777;
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="./" class="back-link">← ツール一覧に戻る</a>

    <h1 class="title">画像比率計算ツール</h1>
    <p class="lead">
      元画像のサイズから、比率を保ったまま任意の横幅・高さを自動計算します。<br>
      画像をドラッグ＆ドロップすると、元サイズも自動で読み取れます。
    </p>

    <div class="grid">
      <section class="card">
        <h2>元画像サイズ</h2>
        <div class="row">
          <div>
            <label for="originalWidth">元の横幅(px)</label>
            <input id="originalWidth" type="number" min="1" placeholder="例：1000" />
          </div>
          <div>
            <label for="originalHeight">元の高さ(px)</label>
            <input id="originalHeight" type="number" min="1" placeholder="例：667" />
          </div>
        </div>

        <h2 style="margin-top:20px;">変換したいサイズ</h2>
        <div class="row">
          <div>
            <label for="targetWidth">新しい横幅(px)</label>
            <input id="targetWidth" type="number" min="1" value="800" />
          </div>
          <div>
            <label for="targetHeight">新しい高さ(px)</label>
            <input id="targetHeight" type="number" min="1" placeholder="高さ基準で計算したい時に入力" />
          </div>
        </div>

        <div class="preset-row">
          <button class="secondary" data-width="800">横800</button>
          <button class="secondary" data-width="1200">横1200</button>
          <button class="secondary" data-width="1600">横1600</button>
          <button class="ghost" id="clearHeightBtn">高さ入力をクリア</button>
        </div>

        <div class="dropzone" id="dropzone">
          <strong>ここに画像をドラッグ＆ドロップ</strong><br>
          または
          <label for="fileInput" style="display:inline; color:var(--accent); cursor:pointer; text-decoration:underline; font-weight:700;">
            ファイルを選択
          </label>
          <input id="fileInput" type="file" accept="image/*" hidden>
          <div class="mini" id="fileInfo">画像のサイズを自動取得できます</div>
        </div>
      </section>

      <aside class="card">
        <h2>計算結果</h2>
        <div class="result">
          <div class="result-label">横幅を基準にした場合の高さ</div>
          <div class="result-value" id="widthResult">-</div>

          <div class="result-label" style="margin-top:18px;">高さを基準にした場合の横幅</div>
          <div class="result-value" id="heightResult">-</div>
        </div>

        <div class="formula" id="formulaText">
          ここに計算式が表示されます。
        </div>

        <div class="inline-actions">
          <button class="primary" id="copyWidthBtn">高さをコピー</button>
          <button class="primary" id="copyHeightBtn">横幅をコピー</button>
        </div>

        <div class="footer-note">
          ・小数点は四捨五入して表示します。<br>
          ・元サイズが入っていれば自動計算されます。<br>
          ・横だけ決めたい時は「新しい横幅」だけ使えばOKです。
        </div>
      </aside>
    </div>
  </div>

  <script>
    const originalWidth = document.getElementById('originalWidth');
    const originalHeight = document.getElementById('originalHeight');
    const targetWidth = document.getElementById('targetWidth');
    const targetHeight = document.getElementById('targetHeight');
    const widthResult = document.getElementById('widthResult');
    const heightResult = document.getElementById('heightResult');
    const formulaText = document.getElementById('formulaText');
    const copyWidthBtn = document.getElementById('copyWidthBtn');
    const copyHeightBtn = document.getElementById('copyHeightBtn');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const dropzone = document.getElementById('dropzone');
    const clearHeightBtn = document.getElementById('clearHeightBtn');

    function roundValue(value) {
      return Math.round(value);
    }

    function calculate() {
      const ow = Number(originalWidth.value);
      const oh = Number(originalHeight.value);
      const tw = Number(targetWidth.value);
      const th = Number(targetHeight.value);

      const validOriginal = ow > 0 && oh > 0;

      if (!validOriginal) {
        widthResult.textContent = '-';
        heightResult.textContent = '-';
        formulaText.textContent = 'ここに計算式が表示されます。';
        return;
      }

      if (tw > 0) {
        const newHeight = roundValue((oh / ow) * tw);
        widthResult.textContent = `${newHeight}px`;
      } else {
        widthResult.textContent = '-';
      }

      if (th > 0) {
        const newWidth = roundValue((ow / oh) * th);
        heightResult.textContent = `${newWidth}px`;
      } else {
        heightResult.textContent = '-';
      }

      const formulaParts = [];
      if (tw > 0) {
        const rawHeight = (oh / ow) * tw;
        formulaParts.push(`高さ = (${oh} ÷ ${ow}) × ${tw} = ${rawHeight.toFixed(2)} → ${Math.round(rawHeight)}px`);
      }
      if (th > 0) {
        const rawWidth = (ow / oh) * th;
        formulaParts.push(`横幅 = (${ow} ÷ ${oh}) × ${th} = ${rawWidth.toFixed(2)} → ${Math.round(rawWidth)}px`);
      }

      formulaText.textContent = formulaParts.length ? formulaParts.join(' / ') : '新しい横幅または高さを入力してください。';
    }

    async function copyText(text) {
      if (!text || text === '-') return;
      try {
        await navigator.clipboard.writeText(text.replace('px', ''));
      } catch (error) {
        alert('コピーできませんでした。');
      }
    }

    async function loadImageSize(file) {
      if (!file || !file.type.startsWith('image/')) return;

      const objectUrl = URL.createObjectURL(file);
      const img = new Image();

      img.onload = () => {
        originalWidth.value = img.naturalWidth;
        originalHeight.value = img.naturalHeight;
        fileInfo.textContent = `${file.name} / ${img.naturalWidth}px × ${img.naturalHeight}px`;
        URL.revokeObjectURL(objectUrl);
        calculate();
      };

      img.onerror = () => {
        fileInfo.textContent = '画像サイズを読み取れませんでした';
        URL.revokeObjectURL(objectUrl);
      };

      img.src = objectUrl;
    }

    [originalWidth, originalHeight, targetWidth, targetHeight].forEach(input => {
      input.addEventListener('input', calculate);
    });

    copyWidthBtn.addEventListener('click', () => copyText(widthResult.textContent));
    copyHeightBtn.addEventListener('click', () => copyText(heightResult.textContent));

    document.querySelectorAll('[data-width]').forEach(btn => {
      btn.addEventListener('click', () => {
        targetWidth.value = btn.dataset.width;
        calculate();
      });
    });

    clearHeightBtn.addEventListener('click', () => {
      targetHeight.value = '';
      calculate();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) loadImageSize(file);
    });

    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('active');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('active');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('active');
      const file = e.dataTransfer.files?.[0];
      if (file) loadImageSize(file);
    });

    calculate();
  </script>
</body>
</html>
