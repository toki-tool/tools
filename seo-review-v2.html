<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO解析ツール V2</title>

<style>
* { box-sizing: border-box; }

:root {
  --card:#fff;
  --text:#222;
  --sub:#666;
  --line:#e7e7ef;
  --accent:#5b7cfa;
  --accent-weak:#eef2ff;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:18px;
  --ok:#1f8f5f;
  --warn:#b7791f;
  --ng:#d64545;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#f8f9ff 0%,#f5f5fa 100%);
  color:var(--text);
}

.wrap {
  max-width:1160px;
  margin:0 auto;
  padding:32px 16px 48px;
}

.back {
  display:inline-block;
  margin-bottom:20px;
  color:var(--accent);
  text-decoration:none;
  font-weight:700;
}

.title {
  font-size:32px;
  font-weight:800;
  margin-bottom:10px;
}

.badge {
  display:inline-block;
  margin-left:8px;
  padding:4px 8px;
  border-radius:999px;
  background:var(--accent-weak);
  color:var(--accent);
  font-size:12px;
  font-weight:700;
}

.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  margin-top:10px;
  font-size:16px;
}

button {
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.secondary {
  background:var(--accent-weak);
  color:var(--accent);
}

.status {
  margin-top:10px;
  padding:10px;
  background:#f9f9ff;
  border-radius:10px;
  color:var(--sub);
}

.site-summary {
  background:#f9f9ff;
  padding:14px;
  border-radius:12px;
  line-height:1.8;
}

.score-layout {
  display:grid;
  grid-template-columns:220px 1fr;
  gap:20px;
  align-items:center;
}

.score-circle {
  width:180px;
  height:180px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  background:conic-gradient(var(--accent) 0deg, #eef2ff 0deg);
}

.score-inner {
  width:132px;
  height:132px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.score-num {
  font-size:40px;
  font-weight:900;
}

.score-label {
  font-size:12px;
  color:#666;
}

.score-comment {
  font-size:18px;
  font-weight:800;
}

.score-grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
}

.score-item {
  background:#f9f9ff;
  border-radius:12px;
  padding:12px;
}

.point-list {
  margin-top:10px;
  padding:10px;
  border:1px solid #eee;
  border-radius:10px;
}

.ok { color:var(--ok); }
.warn { color:var(--warn); }
.ng { color:var(--ng); }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #eee;
  padding:10px;
  font-size:13px;
}

th { background:#f3f4ff; }

/* 🔥 印刷最適化（60%見え） */
@media print {
  .no-print { display:none !important; }
  h1 { display:none !important; }

  body {
    background:#fff;
    font-size:10px;
  }

  .wrap {
    max-width:none;
    width:100%;
    padding:0;
  }

  .card {
    box-shadow:none;
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    page-break-inside:auto;
  }

  h2 {
    font-size:14px;
    margin:0 0 8px;
  }

  .score-layout {
    grid-template-columns:130px 1fr;
    gap:12px;
  }

  .score-circle {
    width:110px;
    height:110px;
  }

  .score-inner {
    width:82px;
    height:82px;
  }

  .score-num {
    font-size:26px;
  }

  .score-label {
    font-size:10px;
  }

  .score-comment {
    font-size:13px;
  }

  table {
    font-size:9px;
  }

  th, td {
    font-size:9px;
    padding:5px;
  }
}
</style>
</head>

<body>
<div class="wrap">

<a href="./" class="back no-print">← 戻る</a>

<h1 class="title">SEO解析ツール V2</h1>

<div class="card no-print">
  <input id="url" placeholder="https://example.com">
  <button id="runBtn">解析する</button>
</div>

<div class="card">
  <h2>SEOスコア</h2>
  <div id="score">未取得</div>
</div>

<div class="card">
  <h2>サイトマップ</h2>
  <div id="result"></div>
</div>

</div>

<script>
//（ここは省略：今のJSそのままでOK）
</script>

</body>
</html>
