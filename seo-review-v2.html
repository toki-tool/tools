<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO解析ツール V2</title>

<style>
* { box-sizing: border-box; }

:root {
  --card:#fff;
  --text:#222;
  --sub:#666;
  --line:#e7e7ef;
  --accent:#5b7cfa;
  --accent-weak:#eef2ff;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:18px;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#f8f9ff 0%,#f5f5fa 100%);
}

.wrap {
  max-width:1100px;
  margin:auto;
  padding:30px;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}

input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid var(--line);
}

button {
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:999px;
  background:#5b7cfa;
  color:#fff;
  font-weight:bold;
}

.status {
  margin-top:10px;
}

/* 🔥進捗バー */
.progress-wrap {
  margin-top:10px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:10px;
  width:0%;
  background:#5b7cfa;
  transition:0.2s;
}

table {
  width:100%;
  border-collapse:collapse;
}

td,th {
  border:1px solid #eee;
  padding:8px;
}

@media print {
  button,input,select { display:none; }
  body { font-size:10px; }
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<input id="url" placeholder="https://example.com">

<select id="limit">
<option value="30">30件</option>
<option value="50">50件</option>
<option value="100" selected>100件</option>
<option value="200">200件</option>
</select>

<button onclick="run()">解析する</button>

<div id="status" class="status"></div>

<!-- 🔥ここが進捗バー -->
<div class="progress-wrap">
  <div id="progressBar" class="progress-bar"></div>
</div>

</div>

<div class="card">
<div id="summary"></div>
</div>

<div class="card">
<div id="result"></div>
</div>

</div>

<script>
const WORKER = "https://seo-tool.geass1127.workers.dev/";

let data = [];
let errorCount = 0;

async function run(){
  const url = document.getElementById("url").value;
  const limit = document.getElementById("limit").value;

  if(!url) return alert("URL入れてね");

  data=[];
  errorCount=0;

  document.getElementById("status").innerText="サイト取得中...";
  document.getElementById("progressBar").style.width="0%";

  const res = await fetch(`${WORKER}?mode=sitemap&url=${encodeURIComponent(url)}&limit=${limit}`);
  const json = await res.json();
  const urls = json.urls || [];

  for(let i=0;i<urls.length;i++){

    try{
      const r = await fetch(`${WORKER}?url=${encodeURIComponent(urls[i])}`);
      const d = await r.json();
      data.push(d);
    }catch{
      errorCount++;
      data.push({title:"取得失敗",url:urls[i],description:""});
    }

    // 🔥進捗更新
    const percent = Math.floor((i+1)/urls.length*100);
    const bar = document.getElementById("progressBar");
    bar.style.width = percent + "%";

    if(percent < 50) bar.style.background="#5b7cfa";
    else if(percent < 80) bar.style.background="#f59e0b";
    else bar.style.background="#10b981";

    document.getElementById("status").innerText =
      `取得中 ${i+1}/${urls.length} (${percent}%)`;

    render();
  }

  document.getElementById("status").innerText="完了！";
}

function render(){
  document.getElementById("result").innerHTML=`
  <table>
    <tr><th>タイトル</th><th>URL</th><th>description</th></tr>
    ${data.map(d=>`
      <tr>
        <td>${d.title||""}</td>
        <td>${d.url||""}</td>
        <td>${d.description||""}</td>
      </tr>
    `).join("")}
  </table>`;
}
</script>

</body>
</html>
