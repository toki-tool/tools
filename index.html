<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>すみの便利ツール</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #222;
      --sub: #666;
      --line: #e7e7ef;
      --accent: #5b7cfa;
      --accent-weak: #eef2ff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #f8f9ff 0%, #f5f5fa 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 40px 16px 56px;
    }

    .title {
      font-size: clamp(32px, 4.8vw, 48px);
      font-weight: 800;
      margin: 0 0 10px;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0 0 28px;
      color: var(--sub);
      line-height: 1.8;
      font-size: 16px;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #d6defe;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.1);
    }

    .tag {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-weak);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .card-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .card-text {
      color: var(--sub);
      line-height: 1.8;
      font-size: 15px;
    }

    .footer {
      margin-top: 24px;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">すみの便利ツール</h1>
    <p class="lead">
      日々の業務でよく使う作業を、少しでも手早く進めるためのミニツール集です。
    </p>

    <div class="grid">
      <a class="card" href="./aspect.html">
        <div class="tag">画像</div>
        <div class="card-title">画像比率計算ツール</div>
        <div class="card-text">
          元画像サイズから、比率を保ったまま新しい横幅・高さを自動計算します。
        </div>
      </a>

      <a class="card" href="./print.html">
        <div class="tag">印刷</div>
        <div class="card-title">印刷解像度チェックツール</div>
        <div class="card-text">
          印刷サイズとDPIから必要なpx数を確認して、画像が使えるか判定できます。
        </div>
      </a>
    </div>

    <div class="footer">
      必要に応じて、今後も少しずつ追加予定です。
    </div>
  </div>
</body>
</html>
