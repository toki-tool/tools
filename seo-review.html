<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO解析ツール</title>

<style>
* { box-sizing: border-box; }

:root {
  --card:#fff;
  --text:#222;
  --sub:#666;
  --line:#e7e7ef;
  --accent:#5b7cfa;
  --accent-weak:#eef2ff;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:18px;
  --ng:#d64545;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#f8f9ff 0%,#f5f5fa 100%);
  color:var(--text);
}

.wrap {
  max-width:1100px;
  margin:0 auto;
  padding:32px 16px 48px;
}

.back {
  display:inline-block;
  margin-bottom:20px;
  color:var(--accent);
  text-decoration:none;
  font-weight:700;
}

.title {
  font-size:32px;
  font-weight:800;
  margin-bottom:10px;
}

.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  margin-top:10px;
  font-size:16px;
}

button {
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.secondary {
  background:var(--accent-weak);
  color:var(--accent);
}

.status {
  margin-top:10px;
  padding:10px;
  background:#f9f9ff;
  border-radius:10px;
  color:var(--sub);
}

.table-wrap {
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td {
  border:1px solid #e5e7eb;
  padding:10px;
  vertical-align:top;
  overflow-wrap:anywhere;
}

th { background:#f3f4ff; }

.site-summary {
  background:#f9f9ff;
  padding:14px;
  border-radius:12px;
  line-height:1.8;
}

.error {
  color:var(--ng);
  font-weight:bold;
}

@media print {
  .no-print { display:none !important; }
  h1 { display:none !important; }
}
</style>
</head>

<body>
<div class="wrap">

<a href="./" class="back no-print">← ツール一覧に戻る</a>

<h1 class="title">SEO解析ツール</h1>

<div class="card no-print">
  <input id="url" placeholder="https://example.com">

  <div class="actions">
    <button id="runBtn">解析する</button>
    <button class="secondary" id="copyBtn">コピー</button>
    <button class="secondary" onclick="window.print()">PDF</button>
  </div>

  <div id="status" class="status">未実行</div>
</div>

<div class="card">
  <h2>サイト情報</h2>
  <div id="summary" class="site-summary">未取得</div>
</div>

<div class="card">
  <h2>サイトマップ</h2>
  <div id="result"></div>
</div>

</div>

<script>
const WORKER = "https://seo-tool.geass1127.workers.dev/";

let data = [];
let siteName = "";
let siteUrl = "";
let errorCount = 0;

const urlInput = document.getElementById("url");

async function run() {
  const input = urlInput.value.trim();
  if (!input) return alert("URL入れてね");

  siteUrl = input;
  data = [];
  siteName = "";
  errorCount = 0;

  const status = document.getElementById("status");
  status.innerText = "サイト構造を取得中...";

  const res = await fetch(`${WORKER}?mode=sitemap&url=${encodeURIComponent(input)}&limit=100`);
  const json = await res.json();
  const urls = json.urls || [];

  if (!urls.length) {
    status.innerText = "取得失敗";
    return;
  }

  for (let i = 0; i < urls.length; i++) {
    const pageUrl = urls[i];

    try {
      const r = await fetch(`${WORKER}?url=${encodeURIComponent(pageUrl)}`);
      const d = await r.json();

      data.push(d);

      if (!siteName && d.title) siteName = d.title;

    } catch (e) {
      errorCount++;

      data.push({
        title: "取得失敗",
        url: pageUrl,
        description: ""
      });
    }

    status.innerText = `取得中 (${i+1}/${urls.length}) / 失敗 ${errorCount}`;

    render();
    updateSummary();
  }

  status.innerText = `完了！ ${data.length}件 / 失敗 ${errorCount}`;
}

function render() {
  document.getElementById("result").innerHTML = `
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>タイトル</th>
          <th>URL</th>
          <th>ディスクリプション</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(d => `
          <tr>
            <td>${escapeHtml(d.title || "なし")}</td>
            <td>${escapeHtml(d.url || "")}</td>
            <td>${escapeHtml(d.description || "なし")}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  </div>`;
}

function updateSummary() {
  document.getElementById("summary").innerHTML = `
    <div><strong>サイト名：</strong>${escapeHtml(siteName || "未取得")}</div>
    <div><strong>URL：</strong>${escapeHtml(siteUrl)}</div>
    <div><strong>取得ページ数：</strong>${data.length}</div>
    <div><strong>取得失敗：</strong>${errorCount}</div>
  `;
}

document.getElementById("copyBtn").onclick = async () => {
  if (!data.length) return alert("先に解析してね！");

  const text = "タイトル\tURL\tディスクリプション\n" +
    data.map(d =>
      `${clean(d.title)}\t${clean(d.url)}\t${clean(d.description)}`
    ).join("\n");

  await navigator.clipboard.writeText(text);
  alert("コピーしたよ！");
};

function clean(str=""){
  return String(str).replace(/\s+/g," ").trim();
}

document.getElementById("runBtn").onclick = run;

urlInput.addEventListener("keydown", e => {
  if (e.key === "Enter") run();
});

function escapeHtml(str=""){
  return str.replace(/[&<>"']/g,s=>({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[s]));
}
</script>

</body>
</html>
