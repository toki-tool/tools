<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO解析ツール</title>

<style>
* { box-sizing: border-box; }

:root {
  --card: #ffffff;
  --text: #222;
  --sub: #666;
  --line: #e7e7ef;
  --accent: #5b7cfa;
  --accent-weak: #eef2ff;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
  --radius: 18px;
  --ok: #1f8f5f;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #f8f9ff 0%, #f5f5fa 100%);
  color: var(--text);
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 16px 48px;
}

.title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 10px;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--line);
}

button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.status {
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid #e5e7eb;
  padding: 10px;
  vertical-align: top;
}

th {
  background: #f3f4ff;
}

/* 列幅固定 */
td:nth-child(1) { width: 30%; }
td:nth-child(2) { width: 25%; font-size: 12px; }
td:nth-child(3) { width: 45%; }

td a {
  word-break: break-all;
}
</style>
</head>

<body>
<div class="wrap">

<h1 class="title">SEO解析ツール</h1>

<div class="card">
  <input id="url" placeholder="https://example.com">
  <button onclick="run()">解析する</button>
  <div id="status" class="status"></div>
</div>

<div class="card">
  <div id="result"></div>
</div>

</div>

<script>
const WORKER = "https://seo-tool.geass1127.workers.dev/";

let data = [];

async function run() {
  const url = document.getElementById("url").value.trim();
  if (!url) return alert("URL入れてね");

  const status = document.getElementById("status");
  const result = document.getElementById("result");

  result.innerHTML = "";
  status.innerText = "サイト構造取得中...";

  const res = await fetch(`${WORKER}?mode=sitemap&url=${encodeURIComponent(url)}`);
  const json = await res.json();
  const urls = json.urls || [];

  if (!urls.length) {
    status.innerText = "URL取得できなかった";
    return;
  }

  status.innerText = `ページ取得中 (0/${urls.length})`;

  data = [];

  for (let i = 0; i < urls.length; i++) {
    const r = await fetch(`${WORKER}?url=${encodeURIComponent(urls[i])}`);
    const d = await r.json();

    data.push(d);

    status.innerText = `ページ取得中 (${i+1}/${urls.length})`;

    render();
  }

  status.innerText = "完了！";
}

function render() {
  document.getElementById("result").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>タイトル</th>
          <th>URL</th>
          <th>ディスクリプション</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(d => `
          <tr>
            <td>${d.title || "なし"}</td>
            <td><a href="${d.url}" target="_blank">${d.url}</a></td>
            <td>${d.description || "なし"}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}
</script>

</body>
</html>
