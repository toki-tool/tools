<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO解析ツール</title>

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f5f6fb;
}

.wrap {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:20px;
  background:#5b7cfa;
  color:#fff;
  margin-right:10px;
}

.status {
  margin-top:10px;
}

table {
  width:100%;
  border-collapse:collapse;
}

td,th {
  border:1px solid #eee;
  padding:8px;
}

/* 🔥 印刷最適化 */
@media print {
  body { font-size:10px; }
  .card { padding:10px; }
  button { display:none; }
  input { display:none; }
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<input id="url" placeholder="https://example.com">

<button onclick="run()">解析</button>
<button onclick="copy()">コピー</button>
<button onclick="makePrompt()">AI提案</button>
<button onclick="window.print()">PDF</button>

<div id="status" class="status"></div>
</div>

<div class="card">
<div id="summary"></div>
</div>

<div class="card">
<div id="result"></div>
</div>

</div>

<script>
const WORKER = "https://seo-tool.geass1127.workers.dev/";

let data = [];
let siteUrl = "";
let siteName = "";
let errorCount = 0;

async function run(){
  const url = document.getElementById("url").value;
  if(!url) return alert("URL入れてね");

  siteUrl = url;
  data = [];
  errorCount = 0;

  document.getElementById("status").innerText="サイト取得中...";

  const res = await fetch(`${WORKER}?mode=sitemap&url=${encodeURIComponent(url)}&limit=200`);
  const json = await res.json();
  const urls = json.urls || [];

  for(let i=0;i<urls.length;i++){
    try{
      const r = await fetch(`${WORKER}?url=${encodeURIComponent(urls[i])}`);
      const d = await r.json();

      data.push(d);
      if(!siteName && d.title) siteName=d.title;

    }catch{
      errorCount++;
      data.push({title:"取得失敗",url:urls[i],description:""});
    }

    document.getElementById("status").innerText=
      `取得中 ${i+1}/${urls.length} 失敗:${errorCount}`;

    render();
    summary();
  }

  document.getElementById("status").innerText="完了";
}

function render(){
  document.getElementById("result").innerHTML=`
  <table>
    <tr><th>タイトル</th><th>URL</th><th>description</th></tr>
    ${data.map(d=>`
      <tr>
        <td>${d.title||""}</td>
        <td>${d.url||""}</td>
        <td>${d.description||""}</td>
      </tr>
    `).join("")}
  </table>`;
}

function summary(){
  document.getElementById("summary").innerHTML=`
  サイト名：${siteName}<br>
  URL：${siteUrl}<br>
  取得：${data.length}<br>
  失敗：${errorCount}
  `;
}

function copy(){
  const text=data.map(d=>`${d.title}\t${d.url}\t${d.description}`).join("\n");
  navigator.clipboard.writeText(text);
  alert("コピーしたよ");
}

function makePrompt(){
  let text="SEO改善提案を作成してください\n\n";
  text+="URL:"+siteUrl+"\n\n";

  data.forEach(d=>{
    text+=`${d.title}\n${d.url}\n${d.description}\n\n`;
  });

  navigator.clipboard.writeText(text);
  alert("AIプロンプトコピーしたよ");
}
</script>

</body>
</html>
