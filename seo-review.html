<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO解析ツール</title>

<style>
* { box-sizing: border-box; }

:root {
  --card:#fff;
  --text:#222;
  --sub:#666;
  --line:#e7e7ef;
  --accent:#5b7cfa;
  --accent-weak:#eef2ff;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:18px;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#f8f9ff 0%,#f5f5fa 100%);
  color:var(--text);
}

.wrap {
  max-width:1100px;
  margin:0 auto;
  padding:32px 16px 48px;
}

.back {
  display:inline-block;
  margin-bottom:20px;
  color:var(--accent);
  text-decoration:none;
  font-weight:700;
}

.title {
  font-size:32px;
  font-weight:800;
  margin-bottom:10px;
}

.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  margin-top:10px;
  font-size:16px;
}

button {
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.secondary {
  background:var(--accent-weak);
  color:var(--accent);
}

.status {
  margin-top:10px;
  padding:10px;
  background:#f9f9ff;
  border-radius:10px;
  color:var(--sub);
}

.table-wrap {
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td {
  border:1px solid #e5e7eb;
  padding:10px;
  vertical-align:top;
  overflow-wrap:anywhere;
  word-break:break-word;
}

th { background:#f3f4ff; }

/* セル幅：URL小さめ、ディスクリプション大きめ */
th:nth-child(1), td:nth-child(1) { width:28%; }
th:nth-child(2), td:nth-child(2) { width:22%; font-size:12px; }
th:nth-child(3), td:nth-child(3) { width:50%; }

.site-summary {
  background:#f9f9ff;
  padding:14px;
  border-radius:12px;
  line-height:1.8;
}

.hidden-copy {
  display:none;
}

@media print {
  .no-print { display:none !important; }
  h1 { display:none !important; }

  body {
    background:#fff;
  }

  .card {
    box-shadow:none;
    border:1px solid #ccc;
  }

  th, td {
    font-size:11px;
    padding:7px;
  }
}
</style>
</head>

<body>
<div class="wrap">

<a href="./" class="back no-print">← ツール一覧に戻る</a>

<h1 class="title">SEO解析ツール</h1>

<div class="card no-print">
  <input id="url" placeholder="https://example.com">

  <select id="purpose">
    <option value="">リニューアル目的を選択</option>

    <option>SEO強化（検索流入増加）</option>
    <option>AIO対策（AI検索最適化）</option>
    <option>ローカルSEO強化（地域検索対策）</option>

    <option>問い合わせ増加（CV改善）</option>
    <option>採用強化（応募増加）</option>

    <option>ブランディング強化</option>
    <option>サービス理解向上（導線改善）</option>

    <option>コンテンツマーケ強化（記事SEO）</option>
    <option>リード獲得（BtoB対策）</option>

    <option>UI/UX改善（離脱率改善）</option>
    <option>サイト構造改善（情報整理）</option>

    <option>既存サイトの課題洗い出し</option>
  </select>

  <input id="customPurpose" placeholder="その他の目的（自由入力）">

  <div class="actions">
    <button id="runBtn">解析する</button>
    <button class="secondary" id="copyBtn">コピー</button>
    <button class="secondary" onclick="window.print()">PDF</button>
    <button class="secondary" id="promptBtn">AI提案用プロンプト生成</button>
  </div>

  <div id="status" class="status">未実行</div>
</div>

<div class="card">
  <h2>サイト情報</h2>
  <div id="summary" class="site-summary">未取得</div>
</div>

<div class="card">
  <h2>サイトマップ</h2>
  <div id="result"></div>
</div>

<!-- コピー用データは非表示。ボタンから直接コピーします -->
<div id="copyText" class="hidden-copy"></div>

</div>

<script>
const WORKER = "https://seo-tool.geass1127.workers.dev/";

let data = [];
let siteName = "";
let siteUrl = "";

const urlInput = document.getElementById("url");

async function run() {
  const input = urlInput.value.trim();
  if (!input) return alert("URL入れてね");

  siteUrl = input;
  data = [];
  siteName = "";

  const status = document.getElementById("status");
  const result = document.getElementById("result");
  const summary = document.getElementById("summary");

  status.innerText = "取得中...";
  result.innerHTML = "";
  summary.innerHTML = "取得中...";

  const res = await fetch(`${WORKER}?mode=sitemap&url=${encodeURIComponent(input)}`);
  const json = await res.json();
  const urls = json.urls || [];

  if (!urls.length) {
    status.innerText = "取得失敗";
    summary.innerHTML = "取得できませんでした。";
    return;
  }

  for (let i = 0; i < urls.length; i++) {
    const r = await fetch(`${WORKER}?url=${encodeURIComponent(urls[i])}`);
    const d = await r.json();

    data.push(d);
    if (!siteName && d.title) siteName = d.title;

    status.innerText = `取得中 (${i + 1}/${urls.length})`;

    render();
    updateSummary();
    updateCopy();
  }

  status.innerText = "完了！";
}

function render() {
  document.getElementById("result").innerHTML = `
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>タイトル</th>
          <th>URL</th>
          <th>ディスクリプション</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(d => `
          <tr>
            <td>${escapeHtml(d.title || "なし")}</td>
            <td>${escapeHtml(d.url || "")}</td>
            <td>${escapeHtml(d.description || "なし")}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  </div>`;
}

function updateSummary() {
  document.getElementById("summary").innerHTML = `
    <div><strong>サイト名：</strong>${escapeHtml(siteName || "未取得")}</div>
    <div><strong>URL：</strong>${escapeHtml(siteUrl)}</div>
    <div><strong>ページ数：</strong>${data.length}</div>
  `;
}

/* スプレッドシート貼り付け対応 */
function updateCopy() {
  let text = "タイトル\tURL\tディスクリプション\n";

  text += data.map(d =>
    `"${(d.title || "").replace(/"/g,'""')}"\t"${d.url || ""}"\t"${(d.description || "").replace(/"/g,'""')}"`
  ).join("\n");

  document.getElementById("copyText").innerText = text;
}

document.getElementById("copyBtn").onclick = () => {
  if (!data.length) {
    alert("先に解析してね！");
    return;
  }

  navigator.clipboard.writeText(document.getElementById("copyText").innerText);
  alert("コピーしたよ！");
};

document.getElementById("runBtn").onclick = run;

/* Enterで解析スタート */
urlInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    run();
  }
});

/* AI提案用プロンプト生成 */
document.getElementById("promptBtn").onclick = async () => {

  if (!data.length) {
    alert("先に解析してね！");
    return;
  }

  const purpose = document.getElementById("purpose").value;
  const custom = document.getElementById("customPurpose").value;

  let prompt = "";

  prompt += "あなたはSEO・Webマーケティング・UI/UX改善に精通したWebコンサルタントです。\n";
  prompt += "以下の現状サイト情報をもとに、実務で使えるレベルの具体的な改善提案を作成してください。\n\n";

  if (purpose) prompt += `【リニューアル目的】\n${purpose}\n\n`;
  if (custom) prompt += `【追加目的】\n${custom}\n\n`;

  prompt += `【サイト名】\n${siteName || "未取得"}\n\n`;
  prompt += `【サイトURL】\n${siteUrl}\n\n`;

  prompt += "【現状サイトマップ】\n";
  data.forEach((d, i) => {
    prompt += `${i + 1}. ${d.title || "タイトルなし"}\n`;
    prompt += `URL: ${d.url}\n`;
    prompt += `description: ${d.description || "なし"}\n\n`;
  });

  prompt += "【分析・提案してほしい内容】\n";
  prompt += "以下の項目について、具体的かつ実務的な内容で提案してください。\n\n";
  prompt += "1. 現状サイト構造の課題\n";
  prompt += "- 重複ページ\n";
  prompt += "- 導線の弱さ\n";
  prompt += "- SEO的に弱い構造\n\n";
  prompt += "2. SEO観点で不足しているページ\n";
  prompt += "- 検索流入を増やすために必要なコンテンツ\n\n";
  prompt += "3. 統合・削除・整理した方がよいページ\n";
  prompt += "- 重複や役割が曖昧なページ\n\n";
  prompt += "4. リニューアル後の推奨サイトマップ\n";
  prompt += "- 分かりやすい階層構造で提示\n\n";
  prompt += "5. title / description の改善方針\n";
  prompt += "- 検索キーワードを意識した方向性\n\n";
  prompt += "6. 優先度付き改善提案\n";
  prompt += "- すぐやるべき\n";
  prompt += "- 中期\n";
  prompt += "- 長期\n\n";
  prompt += "7. クライアント向け説明文\n";
  prompt += "- 専門用語を噛み砕いた提案文\n";

  await navigator.clipboard.writeText(prompt);
  alert("AI提案用プロンプトをコピーしました！");
};

function escapeHtml(str = "") {
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[s]));
}
</script>

</body>
</html>
