<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO解析ツール</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #f8f9ff 0%, #f5f5fa 100%);
  color: #222;
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 16px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.lead {
  color: #666;
  margin-bottom: 20px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 14px;
  border-radius: 999px;
  border: none;
  background: #5b7cfa;
  color: #fff;
  cursor: pointer;
}

.secondary {
  background: #eef2ff;
  color: #5b7cfa;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 14px;
}

th, td {
  border: 1px solid #eee;
  padding: 10px;
  text-align: left;
}

th {
  background: #f3f4ff;
}

td a {
  color: #5b7cfa;
  word-break: break-all;
}

.result {
  margin-top: 10px;
}

@media print {
  button, input { display: none; }
}
</style>
</head>

<body>
<div class="wrap">

<h1>SEO解析ツール</h1>
<p class="lead">サイト構造＋タイトル＋ディスクリプションを自動取得</p>

<div class="card">
  <input id="url" placeholder="https://example.com">

  <div class="actions">
    <button id="runBtn">解析する</button>
    <button class="secondary" onclick="window.print()">PDF</button>
    <button class="secondary" id="copyBtn">コピー</button>
  </div>
</div>

<div class="card">
  <div id="status">未実行</div>
  <div id="result"></div>
</div>

</div>

<script>
const WORKER = "https://seo-tool.geass1127.workers.dev/";

let data = [];

async function run() {
  const url = document.getElementById("url").value.trim();
  if (!url) return alert("URL入れてね");

  const status = document.getElementById("status");
  const result = document.getElementById("result");

  status.innerText = "サイト構造取得中...";
  result.innerHTML = "";

  // ① URL一覧取得
  const sitemapRes = await fetch(`${WORKER}?mode=sitemap&url=${encodeURIComponent(url)}`);
  const sitemapData = await sitemapRes.json();

  const urls = sitemapData.urls || [];
  status.innerText = `ページ取得中... (${urls.length}件)`;

  data = [];

  // ② 各ページ取得
  for (const pageUrl of urls) {
    const res = await fetch(`${WORKER}?url=${encodeURIComponent(pageUrl)}`);
    const json = await res.json();

    data.push(json);

    render();
  }

  status.innerText = "完了";
}

// 表描画
function render() {
  const result = document.getElementById("result");

  result.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>タイトル</th>
          <th>URL</th>
          <th>ディスクリプション</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(d => `
          <tr>
            <td>${escape(d.title || "")}</td>
            <td><a href="${escape(d.url)}" target="_blank">${escape(d.url)}</a></td>
            <td>${escape(d.description || "")}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

// コピー
document.getElementById("copyBtn").onclick = async () => {
  const text = data.map(d =>
`title: ${d.title}
url: ${d.url}
description: ${d.description}`
  ).join("\n\n");

  await navigator.clipboard.writeText(text);
  alert("コピーしたよ！");
};

document.getElementById("runBtn").onclick = run;

document.getElementById("url").addEventListener("keydown", e => {
  if (e.key === "Enter") run();
});

// エスケープ
function escape(str="") {
  return str.replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[s]));
}
</script>

</body>
</html>
