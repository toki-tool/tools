<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO解析ツール</title>

<style>
* { box-sizing: border-box; }

:root {
  --card:#fff;
  --text:#222;
  --sub:#666;
  --line:#e7e7ef;
  --accent:#5b7cfa;
  --accent-weak:#eef2ff;
  --shadow:0 10px 30px rgba(0,0,0,.08);
  --radius:18px;
}

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#f8f9ff 0%,#f5f5fa 100%);
  color:var(--text);
}

.wrap {
  max-width:1100px;
  margin:0 auto;
  padding:32px 16px 48px;
}

.back {
  display:inline-block;
  margin-bottom:20px;
  color:var(--accent);
  text-decoration:none;
  font-weight:700;
}

.title {
  font-size:32px;
  font-weight:800;
  margin-bottom:10px;
}

.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

input, select {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  margin-top:10px;
}

button {
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:999px;
  background:var(--accent);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.secondary {
  background:var(--accent-weak);
  color:var(--accent);
}

.status {
  margin-top:10px;
  padding:10px;
  background:#f9f9ff;
  border-radius:10px;
  color:var(--sub);
}

.table-wrap { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td {
  border:1px solid #e5e7eb;
  padding:10px;
  vertical-align:top;
  overflow-wrap:anywhere;
}

th { background:#f3f4ff; }

th:nth-child(1), td:nth-child(1) { width:30%; }
th:nth-child(2), td:nth-child(2) { width:25%; font-size:12px; }
th:nth-child(3), td:nth-child(3) { width:45%; }

td a { word-break:break-all; }

.copy-area {
  white-space:pre-wrap;
  background:#f9f9ff;
  padding:14px;
  border-radius:12px;
}

.site-summary {
  background:#f9f9ff;
  padding:14px;
  border-radius:12px;
}

@media print {
  .no-print { display:none !important; }
}
</style>
</head>

<body>
<div class="wrap">

<a href="./" class="back no-print">← ツール一覧に戻る</a>

<h1 class="title">SEO解析ツール</h1>

<div class="card no-print">
  <input id="url" placeholder="https://example.com">

  <select id="purpose">
    <option value="">リニューアル目的を選択</option>
    <option>採用強化</option>
    <option>問い合わせ増加</option>
    <option>SEO強化</option>
    <option>ブランディング</option>
  </select>

  <div class="actions">
    <button id="runBtn">解析する</button>
    <button class="secondary" id="copyBtn">コピー</button>
    <button class="secondary" onclick="window.print()">PDF</button>
    <button class="secondary" id="promptBtn">AI提案用プロンプト生成</button>
  </div>

  <div id="status" class="status">未実行</div>
</div>

<div class="card">
  <h2>サイト情報</h2>
  <div id="summary" class="site-summary">未取得</div>
</div>

<div class="card">
  <h2>サイトマップ</h2>
  <div id="result"></div>
</div>

<div class="card no-print">
  <h2>コピー用</h2>
  <div id="copyText" class="copy-area"></div>
</div>

</div>

<script>
const WORKER = "https://seo-tool.geass1127.workers.dev/";

let data = [];
let siteName = "";
let siteUrl = "";

const urlInput = document.getElementById("url");

async function run() {
  const input = urlInput.value.trim();
  if (!input) return alert("URL入れてね");

  siteUrl = input;
  siteName = "";
  data = [];

  const status = document.getElementById("status");

  status.innerText = "取得中...";

  const res = await fetch(`${WORKER}?mode=sitemap&url=${encodeURIComponent(input)}`);
  const json = await res.json();
  const urls = json.urls || [];

  for (let i = 0; i < urls.length; i++) {
    const r = await fetch(`${WORKER}?url=${encodeURIComponent(urls[i])}`);
    const d = await r.json();

    data.push(d);

    if (!siteName && d.title) siteName = d.title;

    status.innerText = `取得中 (${i+1}/${urls.length})`;

    render();
    updateSummary();
    updateCopy();
  }

  status.innerText = "完了！";
}

function render() {
  document.getElementById("result").innerHTML = `
  <table>
    <thead>
      <tr>
        <th>タイトル</th>
        <th>URL</th>
        <th>ディスクリプション</th>
      </tr>
    </thead>
    <tbody>
      ${data.map(d => `
        <tr>
          <td>${d.title || "なし"}</td>
          <td><a href="${d.url}" target="_blank">${d.url}</a></td>
          <td>${d.description || "なし"}</td>
        </tr>
      `).join("")}
    </tbody>
  </table>`;
}

function updateSummary() {
  document.getElementById("summary").innerHTML = `
    <div><strong>サイト名：</strong>${siteName || "未取得"}</div>
    <div><strong>URL：</strong>${siteUrl}</div>
    <div><strong>ページ数：</strong>${data.length}</div>
  `;
}

function updateCopy() {
  document.getElementById("copyText").innerText =
    data.map(d => `title: ${d.title}\nurl: ${d.url}\ndescription: ${d.description}`).join("\n\n");
}

document.getElementById("copyBtn").onclick = () => {
  navigator.clipboard.writeText(document.getElementById("copyText").innerText);
  alert("コピーしたよ！");
};

document.getElementById("runBtn").onclick = run;

urlInput.addEventListener("keydown", e => {
  if (e.key === "Enter") run();
});

/* 🔥 強化プロンプト */
document.getElementById("promptBtn").onclick = async () => {

  if (!data.length) {
    alert("先に解析してね！");
    return;
  }

  const purpose = document.getElementById("purpose").value;

  let prompt = "";

  prompt += "あなたはSEO・Webマーケティング・UI/UX改善に精通したWebコンサルタントです。\n";
  prompt += "以下の現状サイト情報をもとに、実務で使えるレベルの具体的な改善提案を作成してください。\n\n";

  if (purpose) {
    prompt += `【リニューアル目的】\n${purpose}\n\n`;
  }

  prompt += `【サイト名】\n${siteName || "未取得"}\n\n`;
  prompt += `【サイトURL】\n${siteUrl}\n\n`;

  prompt += "【現状サイトマップ】\n";
  data.forEach((d, i) => {
    prompt += `${i + 1}. ${d.title || "タイトルなし"}\n`;
    prompt += `URL: ${d.url}\n`;
    prompt += `description: ${d.description || "なし"}\n\n`;
  });

  prompt += "【分析・提案してほしい内容】\n";
  prompt += "1. 現状サイト構造の課題\n";
  prompt += "2. SEOで不足しているページ\n";
  prompt += "3. 統合・整理すべきページ\n";
  prompt += "4. 推奨サイトマップ\n";
  prompt += "5. title/description改善方針\n";
  prompt += "6. 優先度付き改善提案\n";
  prompt += "7. クライアント向け提案文\n";

  await navigator.clipboard.writeText(prompt);
  alert("AI提案用プロンプトをコピーしました！");
};
</script>

</body>
</html>
