<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印刷解像度チェックツール</title>

<style>
:root {
  --bg: #f7f7fb;
  --card: #ffffff;
  --text: #222;
  --sub: #666;
  --line: #e7e7ef;
  --accent: #5b7cfa;
  --accent-weak: #eef2ff;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
  --radius: 18px;
  --ok: #1f8f5f;
  --ng: #d64545;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #f8f9ff 0%, #f5f5fa 100%);
  color: var(--text);
}

.wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 16px 48px;
}

.title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 10px;
}

.lead {
  color: var(--sub);
  margin-bottom: 20px;
}

.back {
  display: inline-block;
  margin-bottom: 20px;
  color: var(--accent);
  text-decoration: none;
  font-weight: bold;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}

.field {
  margin-bottom: 14px;
}

label {
  font-weight: bold;
  display: block;
  margin-bottom: 6px;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--line);
}

.drop {
  border: 2px dashed #ccc;
  padding: 30px;
  text-align: center;
  margin-top: 20px;
}

.preview, .result {
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
  background: #f9f9ff;
}

.ok { color: var(--ok); font-weight: bold; }
.ng { color: var(--ng); font-weight: bold; }
</style>
</head>

<body>
<div class="wrap">

<a href="./" class="back">← ツール一覧に戻る</a>

<h1 class="title">印刷解像度チェックツール</h1>
<p class="lead">印刷サイズから必要なpxを計算し、画像が使えるか判定します。</p>

<div class="card">

<div class="field">
<label>横(mm)</label>
<input id="wmm" type="number">
</div>

<div class="field">
<label>縦(mm)</label>
<input id="hmm" type="number">
</div>

<div class="field">
<label>DPI</label>
<select id="dpi">
<option value="300">300（印刷）</option>
<option value="350">350</option>
<option value="72">72</option>
</select>
</div>

<div class="preview" id="preview"></div>

<div class="drop" id="drop">ここに画像をドラッグ</div>

<div class="result" id="result"></div>

</div>
</div>

<script>
const w = document.getElementById("wmm");
const h = document.getElementById("hmm");
const dpi = document.getElementById("dpi");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

let imgW = null;
let imgH = null;

function mmToPx(mm, dpi) {
  return Math.round((mm / 25.4) * dpi);
}

function updatePreview() {
  let html = "";

  if (w.value) html += `横：${mmToPx(w.value, dpi.value)}px以上<br>`;
  if (h.value) html += `縦：${mmToPx(h.value, dpi.value)}px以上`;

  preview.innerHTML = html || "サイズを入力してください";
}

function updateResult() {
  if (!imgW) {
    result.innerHTML = "画像を入れてください";
    return;
  }

  let ok = true;
  let html = `画像：${imgW} × ${imgH}px<br>`;

  if (w.value) {
    let need = mmToPx(w.value, dpi.value);
    if (imgW >= need) {
      html += `<div class="ok">横OK</div>`;
    } else {
      html += `<div class="ng">横不足（あと ${need - imgW}px）</div>`;
      ok = false;
    }
  }

  if (h.value) {
    let need = mmToPx(h.value, dpi.value);
    if (imgH >= need) {
      html += `<div class="ok">縦OK</div>`;
    } else {
      html += `<div class="ng">縦不足（あと ${need - imgH}px）</div>`;
      ok = false;
    }
  }

  result.innerHTML = html;
}

[w, h, dpi].forEach(el => el.addEventListener("input", () => {
  updatePreview();
  updateResult();
}));

document.getElementById("drop").addEventListener("drop", e => {
  e.preventDefault();
  let file = e.dataTransfer.files[0];
  let img = new Image();

  img.onload = () => {
    imgW = img.width;
    imgH = img.height;
    updateResult();
  };

  img.src = URL.createObjectURL(file);
});

document.getElementById("drop").addEventListener("dragover", e => e.preventDefault());

updatePreview();
</script>

</body>
</html>
